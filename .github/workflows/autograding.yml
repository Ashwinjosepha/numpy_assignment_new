name: Autograding with Marks

on:
  pull_request:
  push:

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install numpy matplotlib

      - name: Run grading
        run: |
          python << 'EOF'
          import numpy as np
          from assignment import *

          score = 0
          feedback = []

          try:
              if (create_array() == np.arange(1,11)).all():
                  score += 10
                  feedback.append("Q1 ✅")
              else:
                  feedback.append("Q1 ❌")
          except:
              feedback.append("Q1 Error")

          try:
              if (array_arithmetic(np.array([1,2,3]), np.array([4,5,6])) == np.array([5,7,9])).all():
                  score += 10
                  feedback.append("Q2 ✅")
              else:
                  feedback.append("Q2 ❌")
          except:
              feedback.append("Q2 Error")

          try:
              if (slicing_example(np.arange(20)) == np.array([0,1,2,3,4])).all():
                  score += 10
                  feedback.append("Q3 ✅")
              else:
                  feedback.append("Q3 ❌")
          except:
              feedback.append("Q3 Error")

          try:
              if (matrix_multiplication(np.array([[1,2],[3,4]]), np.array([[5,6],[7,8]])) == np.array([[19,22],[43,50]])).all():
                  score += 10
                  feedback.append("Q4 ✅")
              else:
                  feedback.append("Q4 ❌")
          except:
              feedback.append("Q4 Error")

          try:
              arr = random_numbers()
              if len(arr) == 5:
                  score += 10
                  feedback.append("Q5 ✅")
              else:
                  feedback.append("Q5 ❌")
          except:
              feedback.append("Q5 Error")

          try:
              plot_graph()
              score += 10
              feedback.append("Q6 ✅")
          except:
              feedback.append("Q6 ❌")

          with open("result.txt","w") as f:
              f.write(f"Score: {score}/60\n")
              f.write("\n".join(feedback))
          EOF

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('result.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## Autograding Result\n\n" + result
            });
